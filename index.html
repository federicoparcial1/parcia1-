<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Character Counter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700;1,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body>

    <!-- Header: logo + botón de configuración -->
    <header class="header">
      <div class="header__logo">
        <!-- Ícono cuadrado con símbolo "D" estilizado -->
        <div class="header__logo-icon" aria-hidden="true">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="28" height="28" rx="6" fill="#C084FC"/>
            <path d="M8 7h6a7 7 0 0 1 0 14H8V7z" fill="white"/>
            <rect x="8" y="7" width="3" height="14" fill="white" rx="1"/>
          </svg>
        </div>
        <span class="header__logo-text">Character Counter</span>
      </div>

      <!-- Botón settings: ícono de sol/configuración -->
      <button class="header__settings" aria-label="Toggle theme / Settings">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4"/>
          <line x1="12" y1="2"  x2="12" y2="4"/>
          <line x1="12" y1="20" x2="12" y2="22"/>
          <line x1="4.22" y1="4.22"  x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="2" y1="12" x2="4" y2="12"/>
          <line x1="20" y1="12" x2="22" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64"  x2="19.78" y2="4.22"/>
        </svg>
      </button>
    </header>

    <!-- Main: contenido principal de la página -->
    <main class="main">

      <!-- Hero: título principal de la página -->
      <section class="hero">
        <h1 class="hero__title">Analyze your text<br/>in real-time.</h1>
      </section>

      <!-- TEXTAREA -->
      <section class="editor-section">
        <textarea
          class="editor__textarea"
          aria-label="Text input for analysis"
        >Design is the silent ambassador of your brand. Simplicity is key to effective communication, creating clarity in every interaction. A great design transforms complex ideas into elegant solutions, making them easy to understand. It blends aesthetics and functionality seamlessly.</textarea>

        <!-- CONTROLES -->
        <div class="editor__controls">
          <div class="editor__controls-left">
            <label class="checkbox-label">
              <input type="checkbox" class="checkbox-input" />
              <span class="checkbox-custom"></span>
              <span class="checkbox-text">Exclude Spaces</span>
            </label>
            <label class="checkbox-label">
              <input type="checkbox" class="checkbox-input" />
              <span class="checkbox-custom"></span>
              <span class="checkbox-text">Set Character Limit</span>
            </label>
          </div>
          <div class="editor__controls-right">
            <span class="reading-time">Approx. reading time: &lt;1 minute</span>
          </div>
        </div>
      </section>

      <!-- METRIC CARDS -->
      <section class="metrics" aria-label="Text statistics">

        <!-- Card violeta -->
        <article class="card card--violet">
          <div class="card__content">
            <div class="card__number">278</div>
            <div class="card__label">Total Characters</div>
          </div>
          <div class="card__pattern" aria-hidden="true">
            <div class="card__pattern-grid"></div>
          </div>
        </article>

        <!-- Card naranja -->
        <article class="card card--orange">
          <div class="card__content">
            <div class="card__number">39</div>
            <div class="card__label">Word Count</div>
          </div>
          <div class="card__pattern" aria-hidden="true">
            <div class="card__pattern-grid"></div>
          </div>
        </article>

        <!-- Card coral/salmon -->
        <article class="card card--coral">
          <div class="card__content">
            <div class="card__number">04</div>
            <div class="card__label">Sentence Count</div>
          </div>
          <div class="card__pattern" aria-hidden="true">
            <div class="card__pattern-grid"></div>
          </div>
        </article>

      </section>

      <!-- LETTER DENSITY -->
      <section class="density">
        <h2 class="density__title">Letter Density</h2>
        <div class="density__list">

          <div class="density__row">
            <span class="density__letter">E</span>
            <div class="density__bar-track">
              <div class="density__bar-fill" style="width: 100%"></div>
            </div>
            <span class="density__stats">40 <span class="density__percent">(16.06%)</span></span>
          </div>

          <div class="density__row">
            <span class="density__letter">I</span>
            <div class="density__bar-track">
              <div class="density__bar-fill" style="width: 72%"></div>
            </div>
            <span class="density__stats">29 <span class="density__percent">(11.65%)</span></span>
          </div>

          <div class="density__row">
            <span class="density__letter">T</span>
            <div class="density__bar-track">
              <div class="density__bar-fill" style="width: 70%"></div>
            </div>
            <span class="density__stats">28 <span class="density__percent">(11.24%)</span></span>
          </div>

          <div class="density__row">
            <span class="density__letter">O</span>
            <div class="density__bar-track">
              <div class="density__bar-fill" style="width: 55%"></div>
            </div>
            <span class="density__stats">22 <span class="density__percent">(8.84%)</span></span>
          </div>

          <div class="density__row">
            <span class="density__letter">N</span>
            <div class="density__bar-track">
              <div class="density__bar-fill" style="width: 52%"></div>
            </div>
            <span class="density__stats">21 <span class="density__percent">(8.43%)</span></span>
          </div>

        </div>

        <!-- "See more" link -->
        <button class="density__see-more" aria-expanded="false">
          See more
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </button>
      </section>

    </main>

  </body>
</html>
